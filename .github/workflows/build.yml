name: Build

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke-test deployed site
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          origin="$(printf '%s' "$url" | grep -Eo 'https?://[^/]+')"

          html=""
          for attempt in 1 2 3 4 5; do
            html="$(curl -fsSL "$url")" && break
            echo "Fetch attempt $attempt failed; retrying..."
            sleep 10
          done
          [ -n "$html" ] || { echo "::error::Deployed page at $url is unreachable"; exit 1; }

          css="$(printf '%s' "$html" | grep -Eo '<link rel="stylesheet" href="[^"]+"' | head -1 | sed 's/.*href="//;s/"$//')"
          [ -n "$css" ] || { echo "::error::No stylesheet link found in deployed HTML"; exit 1; }

          case "$css" in
            http*) target="$css" ;;
            /*)    target="$origin$css" ;;
            *)     target="$url$css" ;;
          esac
          curl -fsS -o /dev/null "$target" \
            || { echo "::error::Stylesheet $target is not loadable — asset paths do not match where Pages serves the site"; exit 1; }
          echo "OK: $target loads."
